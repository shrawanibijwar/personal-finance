{% extends 'base.html' %}
{% block title %}Add Review{% endblock %}

{% block body_class %}review-page{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="card p-4 shadow review-section">
    <h3 class="mb-3">✍️ Add Your Review</h3>
    <form method="POST" action="{{ url_for('add_review') }}" class="auth-form">
      <div class="mb-3">
        <label class="form-label">Name (optional)</label>
        <input type="text" name="name" class="form-control" placeholder="Your name" maxlength="100">
      </div>
      <div class="mb-3">
        <label class="form-label">Rating</label>
        <select name="rating" class="form-select" required>
          <option value="">Select rating</option>
          <option value="1">1 ★</option>
          <option value="2">2 ★★</option>
          <option value="3">3 ★★★</option>
          <option value="4">4 ★★★★</option>
          <option value="5">5 ★★★★★</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Review Text</label>
        <textarea name="text" class="form-control" rows="4" placeholder="Write your review..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit Review</button>
      <a href="{{ url_for('review') }}" class="btn btn-secondary ms-2">Back</a>
    </form>
  </div>
</div>

{% endblock %}
