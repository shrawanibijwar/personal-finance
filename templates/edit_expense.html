{% extends 'base.html' %}
{% block title %}Edit Expense{% endblock %}

{% block content %}

<div class="container mt-5">

  <div class="card shadow p-4 edit-card">

    <h3 class="mb-4">✏️ Edit Expense</h3>

    <form method="POST">

      <!-- Title -->
      <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" class="form-control"
               value="{{ expense.title }}" required>
      </div>

      <!-- Amount -->
      <div class="mb-3">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount"
               class="form-control"
               value="{{ expense.amount }}" required>
      </div>

      <!-- Category -->
      <div class="mb-3">
        <label>Category</label>
        <select name="category" class="form-control">

          {% set categories = ['Food','Shopping','Bills','Travel','Health','Entertainment','Education','Other'] %}

          {% for c in categories %}
            <option value="{{ c }}" {% if expense.category == c %}selected{% endif %}>
              {{ c }}
            </option>
          {% endfor %}

        </select>
      </div>

      <!-- Frequency -->
      <div class="mb-3">
        <label>Frequency</label>
        <select name="frequency" class="form-control">

          <option value="daily" {% if expense.frequency == 'daily' %}selected{% endif %}>Daily</option>
          <option value="monthly" {% if expense.frequency == 'monthly' %}selected{% endif %}>Monthly</option>
          <option value="yearly" {% if expense.frequency == 'yearly' %}selected{% endif %}>Yearly</option>

        </select>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label>Description</label>
        <input type="text" name="description"
               class="form-control"
               value="{{ expense.description }}">
      </div>

      <button type="submit" class="btn-update w-100">
        Update Expense
      </button>

    </form>

  </div>

</div>

{% endblock %}
